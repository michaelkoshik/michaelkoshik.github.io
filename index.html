<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#000000">
    <title>Michael Koshik</title>
    
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link class="apple-touch-icon" sizes="180x180" href="assets/images/logo-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/logo-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/logo-512x512.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;700&family=Funnel+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 25, 0.6);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            cursor: default;
        }

        @keyframes moveGrid {
            from { background-position: 20px 0; }
            to { background-position: 20px 30px; }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Funnel Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;

            background-image: 
                linear-gradient(rgba(70, 70, 70, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 70, 70, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 2s linear infinite;
        }

        .cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
        }

        h1, .card-label, .username {
            font-family: 'Funnel Display', sans-serif;
        }

        .card-icon svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            filter: grayscale(100%) brightness(70%);
            transition: filter 0.3s;
        }
        .card:hover .card-icon svg {
            filter: grayscale(0%) brightness(100%);
        }

        .main-wrapper {
            width: 100%;
            max-width: 400px;
            position: relative;
            text-align: center;
        }

        .profile-header { text-align: center; margin-bottom: 24px; }
        .username { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; text-transform: lowercase; }
        .bio-text { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            text-align: left;
        }
        .card:hover { transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.3); background: rgba(30, 30, 35, 0.7); }

        .card-header { display: flex; align-items: center; gap: 8px; }
        .card-label { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .card-value { font-size: 0.95rem; font-weight: 500; color: #fff; word-break: break-word; }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="main-wrapper">
        <div class="profile-header">
            <h1 class="username">michaelkoshik</h1>
            <p class="bio-text">
                This website is temporarily closed.
            </p>
        </div>

        <a href="mailto:iam@michaelkoshik.com" class="card">
            <div class="card-header">
                <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
                <span class="card-label">Email</span>
            </div>
            <span class="card-value">iam@michaelkoshik.com</span>
        </a>
    </div>

    <script>
        const cursorGlow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
